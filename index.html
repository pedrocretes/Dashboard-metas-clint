<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas CS · Clint</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══ TOKENS ═══ */
:root {
  --bg:       #0D0818;
  --surface:  #1A1235;
  --surface2: #221848;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.05);
  --text:     #ffffff;
  --text2:    rgba(255,255,255,0.6);
  --text3:    rgba(255,255,255,0.3);
  --grad:     linear-gradient(135deg,#8B21E8,#C832D8,#F5B731);
  --grad-btn: linear-gradient(135deg,#8B21E8,#C832D8);
  --sg: #34d399; --sa: #fbbf24; --sr: #f87171;
  --input-bg: #130D22;
  --chip-g-bg:rgba(52,211,153,.12);  --chip-g-c:#34d399; --chip-g-b:rgba(52,211,153,.2);
  --chip-a-bg:rgba(251,191,36,.12);  --chip-a-c:#fbbf24; --chip-a-b:rgba(251,191,36,.2);
  --chip-r-bg:rgba(248,113,113,.12); --chip-r-c:#f87171; --chip-r-b:rgba(248,113,113,.2);
  --chip-e-bg:rgba(255,255,255,.04); --chip-e-c:rgba(255,255,255,.3); --chip-e-b:rgba(255,255,255,.08);
  --note-bg:rgba(139,33,232,.1); --note-c:rgba(167,139,250,.9); --note-b:rgba(139,33,232,.2);
}
 
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
 
/* ═══ AUTH ═══ */
#authScreen {
  display:none; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:32px;
}
.auth-logo-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
.auth-logo-img { width:56px; height:56px; border-radius:14px; }
.auth-logo-name { font-size:1.1rem; font-weight:700; letter-spacing:.04em; color:var(--text); }
.auth-logo-sub  { font-size:.65rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); }
.auth-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:40px 44px; width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.4);
}
.auth-title { font-size:1.4rem; font-weight:300; color:var(--text); margin-bottom:28px; }
.auth-tabs { display:flex; margin-bottom:24px; border-bottom:1px solid var(--border); }
.auth-tab {
  padding:7px 20px 11px; font-family:'Sora',sans-serif; font-size:.78rem; font-weight:600;
  color:var(--text3); background:transparent; border:none; cursor:pointer;
  margin-bottom:-1px; border-bottom:2px solid transparent; transition:color .15s;
}
.auth-tab.active { color:var(--text); border-bottom-color:#8B21E8; }
.auth-field { margin-bottom:14px; }
.auth-field label { display:block; font-size:.6rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:5px; }
.auth-field input {
  width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:10px;
  font-family:'Sora',sans-serif; font-size:.9rem; font-weight:300;
  color:var(--text); background:var(--input-bg); outline:none; transition:border-color .15s;
}
.auth-field input:focus { border-color:#8B21E8; }
.auth-btn {
  width:100%; padding:11px; margin-top:6px;
  background:var(--grad-btn); color:#fff; border:none; border-radius:10px;
  font-family:'Sora',sans-serif; font-size:.82rem; font-weight:600; cursor:pointer; transition:opacity .15s;
}
.auth-btn:hover { opacity:.85; }
.auth-btn:disabled { opacity:.4; cursor:default; }
.auth-error {
  margin-top:12px; padding:10px 13px; background:rgba(248,113,113,.1);
  border:1px solid rgba(248,113,113,.2); border-radius:8px;
  font-size:.72rem; color:#f87171; display:none;
}
 
/* ═══ APP ═══ */
#app { display:none; flex-direction:column; align-items:center; min-height:100vh; }
 
/* Clint bar */
.clint-bar {
  width:100%; display:flex; justify-content:center; align-items:center; gap:10px;
  padding:14px 24px; background:var(--bg); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.clint-logo { width:30px; height:30px; border-radius:7px; }
.clint-name { font-size:.82rem; font-weight:700; letter-spacing:.04em; color:var(--text); }
.clint-sub  { font-size:.55rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-top:1px; }
 
/* User bar */
.user-bar {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:14px 40px; border-bottom:1px solid var(--border);
  background:var(--surface);
}
.brand { display:flex; align-items:center; gap:12px; }
.avatar {
  width:34px; height:34px; border-radius:9px; background:var(--grad-btn);
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700; color:#fff; flex-shrink:0;
}
.username { font-size:.88rem; font-weight:600; color:var(--text); }
.nav { display:flex; align-items:center; gap:8px; }
.nbtn {
  padding:7px 18px; border-radius:99px; font-size:.72rem; font-weight:600;
  border:1px solid var(--border); background:transparent; color:var(--text3);
  cursor:pointer; font-family:'Sora',sans-serif; transition:all .2s;
}
.nbtn.active { background:var(--grad-btn); color:#fff; border-color:transparent; }
.nbtn:hover:not(.active) { color:var(--text2); border-color:rgba(255,255,255,.15); }
.logout-btn {
  padding:7px 16px; border-radius:99px; font-size:.72rem; font-weight:500;
  border:1px solid var(--border); background:transparent; color:var(--text3);
  cursor:pointer; font-family:'Sora',sans-serif; transition:all .2s;
}
.logout-btn:hover { color:var(--text2); }
 
/* Content area */
.content { display:flex; flex-direction:column; align-items:center; padding:40px 24px 80px; width:100%; }
.inner { width:100%; max-width:900px; display:flex; flex-direction:column; gap:16px; }
 
/* Month row */
.month-row { display:flex; justify-content:space-between; align-items:center; }
.month-label { font-size:.6rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); }
.months { display:flex; gap:4px; }
.mpill {
  padding:5px 14px; border-radius:99px; font-size:.7rem; font-weight:500;
  border:1px solid transparent; background:transparent; color:var(--text3);
  cursor:pointer; font-family:'Sora',sans-serif; transition:all .2s;
}
.mpill.active { background:var(--surface2); color:var(--text); border-color:var(--border); }
.mpill.locked { opacity:.25; cursor:default; }
.mpill:not(.active):not(.locked):hover { color:var(--text2); }
 
/* Global card */
.global-card {
  background:#1c1a17; border:1px solid var(--border);
  border-radius:20px; padding:32px 40px;
  display:flex; align-items:center; justify-content:space-between; gap:32px;
  position:relative; overflow:hidden;
}
.global-card::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle,rgba(139,33,232,.2) 0%,transparent 70%);
  pointer-events:none;
}
.g-eyebrow { font-size:.58rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase; margin-bottom:6px; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.g-number { font-size:3.6rem; font-weight:300; letter-spacing:-.04em; line-height:1; color:#fff; }
.g-sub { font-size:.7rem; color:#6b6456; margin-top:4px; }
.g-arc { flex-shrink:0; }
.g-breakdown { display:flex; flex-direction:column; gap:9px; min-width:160px; }
.gb-row { display:flex; align-items:center; gap:10px; }
.gb-name { font-size:.62rem; color:#6b6456; font-weight:500; width:62px; flex-shrink:0; }
.gb-track { flex:1; height:3px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; }
.gb-fill { height:100%; border-radius:99px; transition:width .7s cubic-bezier(.4,0,.2,1); }
.gb-pct { font-size:.62rem; font-weight:600; color:rgba(255,255,255,.5); min-width:34px; text-align:right; }
 
/* KPI grid */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.kpi {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:24px 22px 20px;
  position:relative; overflow:hidden; transition:border-color .2s, transform .2s; cursor:default;
}
.kpi:hover { border-color:rgba(139,33,232,.3); transform:translateY(-1px); }
.kpi-name { font-size:.6rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:16px; }
.kpi-num  { font-size:2.4rem; font-weight:300; letter-spacing:-.03em; line-height:1; color:var(--text); }
.kpi-meta { font-size:.68rem; color:var(--text3); margin-top:6px; }
.dot { position:absolute; top:22px; right:20px; width:7px; height:7px; border-radius:50%; }
.dot-g { background:var(--sg); box-shadow:0 0 8px rgba(52,211,153,.4); }
.dot-a { background:var(--sa); box-shadow:0 0 8px rgba(251,191,36,.4); }
.dot-r { background:var(--sr); box-shadow:0 0 8px rgba(248,113,113,.4); }
.dot-e { background:rgba(255,255,255,.2); }
.kpi-edit {
  position:absolute; bottom:0; left:0; right:0; padding:8px; text-align:center;
  font-size:.6rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--text3); background:var(--surface2); border:none; border-top:1px solid var(--border);
  cursor:pointer; font-family:'Sora',sans-serif;
  opacity:0; transform:translateY(4px); transition:opacity .18s, transform .18s;
}
.kpi:hover .kpi-edit { opacity:1; transform:translateY(0); }
.kpi-edit:hover { color:var(--text2); background:rgba(139,33,232,.15); }
 
/* Note */
.note {
  padding:10px 16px; background:var(--note-bg); border:1px solid var(--note-b);
  border-radius:10px; font-size:.7rem; color:var(--note-c); font-weight:500;
}
 
/* Supervisor panel */
.sup-panel {
  background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden;
}
.sup-head {
  padding:18px 28px; border-bottom:1px solid var(--border);
  font-size:.6rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text3);
}
.cs-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; border-bottom:1px solid var(--border2); cursor:default; transition:background .15s;
}
.cs-row:last-child { border-bottom:none; }
.cs-row:hover { background:var(--surface2); }
.cs-left { display:flex; align-items:center; gap:12px; }
.cs-av {
  width:36px; height:36px; border-radius:9px; background:var(--grad-btn);
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700; color:#fff; flex-shrink:0;
}
.cs-name  { font-size:.82rem; font-weight:600; color:var(--text); }
.cs-email { font-size:.65rem; color:var(--text3); margin-top:2px; }
.cs-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:flex-end; }
.chips { display:flex; gap:5px; flex-wrap:wrap; }
.chip { display:inline-block; padding:2px 8px; border-radius:99px; font-size:.63rem; font-weight:600; }
.chip-g { background:var(--chip-g-bg); color:var(--chip-g-c); border:1px solid var(--chip-g-b); }
.chip-a { background:var(--chip-a-bg); color:var(--chip-a-c); border:1px solid var(--chip-a-b); }
.chip-r { background:var(--chip-r-bg); color:var(--chip-r-c); border:1px solid var(--chip-r-b); }
.chip-e { background:var(--chip-e-bg); color:var(--chip-e-c); border:1px solid var(--chip-e-b); }
.cs-pct { font-size:.85rem; font-weight:600; min-width:44px; text-align:right; }
.cs-pct.g { color:var(--sg); } .cs-pct.a { color:var(--sa); } .cs-pct.r { color:var(--sr); } .cs-pct.n { color:var(--text3); }
.edit-meta-btn {
  padding:5px 12px; border-radius:8px; font-size:.63rem; font-weight:600;
  border:1px solid var(--border); background:transparent; color:var(--text3);
  cursor:pointer; font-family:'Sora',sans-serif; transition:all .18s; white-space:nowrap;
}
.edit-meta-btn:hover { background:var(--grad-btn); color:#fff; border-color:transparent; }
 
/* Modal */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.6); backdrop-filter:blur(12px);
  z-index:500; align-items:center; justify-content:center;
}
.overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:30px; width:390px; max-height:90vh; overflow-y:auto;
  box-shadow:0 40px 80px rgba(0,0,0,.5); animation:up .2s cubic-bezier(.4,0,.2,1);
}
@keyframes up { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:none} }
.m-ey { font-size:.58rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
.m-title { font-size:1rem; font-weight:500; color:var(--text); margin-bottom:20px; }
.mfields { display:flex; flex-direction:column; gap:10px; }
.mfield label { display:block; font-size:.58rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
.mfield input {
  width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:9px;
  font-family:'Sora',sans-serif; font-size:.88rem; font-weight:300;
  color:var(--text); background:var(--input-bg); outline:none; transition:border-color .15s;
}
.mfield input:focus { border-color:#8B21E8; }
.mactions { display:flex; gap:8px; margin-top:20px; }
.btn-save { flex:1; padding:10px; background:var(--grad-btn); color:#fff; border:none; border-radius:9px; font-family:'Sora',sans-serif; font-size:.8rem; font-weight:600; cursor:pointer; transition:opacity .15s; }
.btn-save:hover { opacity:.85; }
.btn-save:disabled { opacity:.4; cursor:default; }
.btn-cancel { padding:10px 16px; background:transparent; color:var(--text3); border:1px solid var(--border); border-radius:9px; font-family:'Sora',sans-serif; font-size:.8rem; cursor:pointer; transition:all .15s; }
.btn-cancel:hover { color:var(--text2); border-color:rgba(255,255,255,.15); }
 
/* Empty state */
.empty-state { padding:48px; text-align:center; font-size:.75rem; color:var(--text3); font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
 
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.kpi { animation:fadeUp .4s ease both; }
.kpi:nth-child(1){animation-delay:.04s} .kpi:nth-child(2){animation-delay:.08s} .kpi:nth-child(3){animation-delay:.12s}
.kpi:nth-child(4){animation-delay:.16s} .kpi:nth-child(5){animation-delay:.20s} .kpi:nth-child(6){animation-delay:.24s}
</style>
</head>

function f1(v) { return v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}); }
function f2(v) { return v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:1}); }
 
function emptyPerf() {
  const p={};
  MONTH_KEYS.forEach(k=>{ p[k]={conversao:null,churn:null,reengajamento:null,cobertura:null,reunioes:null,nps:null}; });
  return p;
}
 
function emptyMeta() {
  const m={};
  MONTH_KEYS.forEach(k=>{ m[k]=null; });
  return m;
}
 
function getMetaFor(metaObj, mi) {
  const mkey = MONTH_KEYS[mi];
  return (metaObj && metaObj[mkey]) ? metaObj[mkey] : DEFAULT_META;
}
 
function pctKPI(key, val, meta) {
  if (val===null||val===undefined) return null;
  const m = meta || DEFAULT_META;
  if (key==='churn')   return m.churn / val * 100;
  return val / m[key] * 100;
}
 
function globalScore(perf, meta, mi) {
  const keys = ['conversao','churn','reengajamento','cobertura','reunioes','nps'];
  const m = getMetaFor(meta, mi);
  const perfM = perf[MONTH_KEYS[mi]] || {};
  const vals = keys.map(k=>pctKPI(k, perfM[k], m)).filter(v=>v!==null);
  if (!vals.length) return null;
  return vals.map(v=>Math.min(v,200)).reduce((a,b)=>a+b,0)/vals.length;
}
 
function dotClass(pct) {
  if (pct===null) return 'dot-e';
  if (pct>=100)   return 'dot-g';
  if (pct>=75)    return 'dot-a';
  return 'dot-r';
}
 
function initials(name) {
  return (name||'CS').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').style.display  = tab==='login'  ? 'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block':'none';
  hideAuthError();
}
function showAuthError(msg) { const el=document.getElementById('authError'); el.textContent=msg; el.style.display='block'; }
function hideAuthError() { document.getElementById('authError').style.display='none'; }
 
async function doLogin() {
  const email=document.getElementById('loginEmail').value.trim();
  const pass =document.getElementById('loginPass').value;
  if (!email||!pass) return showAuthError('Preencha e-mail e senha.');
  const btn=document.querySelector('#loginForm .auth-btn');
  btn.disabled=true; btn.textContent='Entrando...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false; btn.textContent='Entrar';
  if (error) { showAuthError('E-mail ou senha incorretos.'); return; }
  if (data?.session) { booted=true; await bootApp(data.session); }
}
 
async function doSignup() {
  const name =document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass =document.getElementById('signupPass').value;
  if (!name||!email||!pass) return showAuthError('Preencha todos os campos.');
  if (pass.length<6) return showAuthError('Senha deve ter ao menos 6 caracteres.');
  const btn=document.querySelector('#signupForm .auth-btn');
  btn.disabled=true; btn.textContent='Criando...';
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
  btn.disabled=false; btn.textContent='Criar conta';
  if (error) return showAuthError('Erro: '+error.message);
  if (data?.session) { booted=true; await bootApp(data.session); return; }
  const el=document.getElementById('authError');
  el.textContent='Conta criada! Já pode entrar.';
  el.style.cssText='display:block;background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.2)';
}
 
async function doLogout() {
  booted=false;
  await sb.auth.signOut();
  showAuth();
}
 
function showAuth() {
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function showApp() {
  document.getElementById('authScreen').style.display='none';

async function loadUserPerf(userId) {
  const {data}=await sb.from('metricas').select('*').eq('user_id',userId);
  const p=emptyPerf();
  if (data) data.forEach(row=>{ if(p[row.mes]) Object.assign(p[row.mes],{conversao:row.conversao,churn:row.churn,reengajamento:row.reengajamento,cobertura:row.cobertura,reunioes:row.reunioes,nps:row.nps}); });
  return p;
}
 
async function loadUserMeta(userId) {
  const {data}=await sb.from('metas_usuario').select('*').eq('user_id',userId);
  const m=emptyMeta();
  if (data) data.forEach(row=>{ m[row.mes]={conversao:row.conversao,churn:row.churn,reengajamento:row.reengajamento,cobertura:row.cobertura,reunioes:row.reunioes,nps:row.nps}; });
  return m;
}
 
async function loadTeamData() {
  const [{data:profiles},{data:metricas},{data:metas}] = await Promise.all([
    sb.from('profiles').select('id,name,email'),
    sb.from('metricas').select('*'),
    sb.from('metas_usuario').select('*'),
  ]);
  if (!profiles) return;
 
  teamData = profiles.map(profile => {
    const p = emptyPerf();
    const m = emptyMeta();
    if (metricas) metricas.filter(r=>r.user_id===profile.id).forEach(row=>{ if(p[row.mes]) Object.assign(p[row.mes],{conversao:row.conversao,churn:row.churn,reengajamento:row.reengajamento,cobertura:row.cobertura,reunioes:row.reunioes,nps:row.nps}); });
    if (metas)    metas.filter(r=>r.user_id===profile.id).forEach(row=>{ m[row.mes]={conversao:row.conversao,churn:row.churn,reengajamento:row.reengajamento,cobertura:row.cobertura,reunioes:row.reunioes,nps:row.nps}; });
    teamMetas[profile.id] = m;
    return {id:profile.id, name:profile.name, email:profile.email, perf:p, meta:m};
  });
}
 
async function savePerfKPI(key, value) {
  const mes = MONTH_KEYS[activeMonth];
  const {data:{session}}=await sb.auth.getSession();
  if (!session) { doLogout(); return false; }
  const row = {user_id:currentUser.id, mes, ...userPerf[mes], [key]:value};
  const {error}=await sb.from('metricas').upsert(row,{onConflict:'user_id,mes'});
  if (error) { console.error(error); return false; }
  userPerf[mes][key]=value;
  return true;
}
 
async function saveMetaForUser(userId, metaValues) {
  const mes = MONTH_KEYS[activeMonth];
  const row = {user_id:userId, mes, ...metaValues};
  const {error}=await sb.from('metas_usuario').upsert(row,{onConflict:'user_id,mes'});
  if (error) { console.error(error); return false; }
  // Update local cache
  const member = teamData.find(m=>m.id===userId);
  if (member) { member.meta[mes]=metaValues; }
  teamMetas[userId] = teamMetas[userId] || emptyMeta();
  teamMetas[userId][mes] = metaValues;
  return true;
}

function render() {
  const mi   = activeMonth;
  const mkey = MONTH_KEYS[mi];
 
  // Month label + pills
  document.getElementById('monthLabel').textContent = MONTHS[mi];
  document.getElementById('months').innerHTML = MONTHS.map((m,i)=>{
    const future = i > new Date().getMonth();
    const active = i === activeMonth;
    const cls = active?'active':future?'locked':'';
    const action = (!future&&!active)?`onclick="setMonth(${i})"` :'';
    return `<button class="mpill ${cls}" ${action}>${m.slice(0,3)}</button>`;
  }).join('');
 
  if (isSupervisor) renderSupervisor(mi, mkey);
  else renderOwn(mi, mkey);
}
 
function renderOwn(mi, mkey) {
  const mp   = userPerf[mkey] || {};
  const meta = getMetaFor(userMeta, mi);
  const gbl  = globalScore(userPerf, userMeta, mi);
 
  // Global card
  document.getElementById('gEyebrow').textContent = `Meta Global — ${MONTHS[mi]}`;
  document.getElementById('gNumber').textContent  = gbl!==null ? f1(gbl)+'%' : '—';
  document.getElementById('gSub').textContent     = gbl===null ? 'Sem dados' : gbl>=100 ? 'Meta atingida' : `${f1(100-gbl)} p.p. abaixo da meta`;
 
  const circ=214, clamp=gbl!==null?Math.min(gbl,100):0;
  document.getElementById('gArcFill').setAttribute('stroke-dasharray',`${(clamp/100)*circ} ${circ}`);
 
  const BK=[['conversao','Conversão'],['churn','Churn'],['reengajamento','Reengaj.'],['cobertura','Cobertura'],['reunioes','Reuniões'],['nps','NPS']];
  document.getElementById('gBreakdown').innerHTML = BK.map(([key,label])=>{
    const pv=pctKPI(key,mp[key],meta), clampPv=pv!==null?Math.min(pv,100):0;
    const col=pv===null?'rgba(255,255,255,.07)':pv>=100?'#34d399':pv>=75?'#fbbf24':'#f87171';
    return `<div class="gb-row"><span class="gb-name">${label}</span><div class="gb-track"><div class="gb-fill" style="width:${clampPv}%;background:${col}"></div></div><span class="gb-pct">${pv!==null?Math.round(pv)+'%':'—'}</span></div>`;
  }).join('');
 
  // KPI cards
  const KPI_DEFS=[
    {key:'conversao',     name:'Conversão de Renovação', fmt:v=>v+'%',    metaLabel:`Meta ${meta.conversao}%`,      editLabel:'Realizado (%)'},
    {key:'churn',         name:'Churn do Período',        fmt:v=>v+'%',    metaLabel:`Meta ≤ ${meta.churn}%`,       editLabel:'Churn realizado (%)'},
    {key:'reengajamento', name:'Taxa de Reengajamento',   fmt:v=>v+'%',    metaLabel:`Meta ${meta.reengajamento}%`, editLabel:'Realizado (%)'},
    {key:'cobertura',     name:'Cobertura de Carteira',   fmt:v=>v+'%',    metaLabel:`Meta ${meta.cobertura}%`,     editLabel:'Clientes contatados (%)'},
    {key:'reunioes',      name:'Reuniões Realizadas',     fmt:v=>String(v),metaLabel:`Meta ${meta.reunioes}`,       editLabel:'Reuniões realizadas'},
    {key:'nps',           name:'NPS',                     fmt:v=>String(v),metaLabel:`Meta ${meta.nps}`,            editLabel:'NPS alcançado'},
  ];
  document.getElementById('kpiGrid').innerHTML = KPI_DEFS.map(d=>{
    const val=mp[d.key], pct=pctKPI(d.key,val,meta), noData=val===null||val===undefined;
    return `<div class="kpi">
      <span class="dot ${noData?'dot-e':dotClass(pct)}"></span>
      <div class="kpi-name">${d.name}</div>
      <div class="kpi-num">${noData?'—':d.fmt(val)}</div>
      <div class="kpi-meta">${d.metaLabel}</div>
      <button class="kpi-edit" onclick="openPerfModal('${d.key}','${d.name}','${d.editLabel}',${JSON.stringify(val)})">Editar</button>
    </div>`;
  }).join('');
}
 
function renderSupervisor(mi, mkey) {
  document.getElementById('supMonthLabel').textContent = MONTHS[mi];
  document.getElementById('supTimeLabel').textContent  = MONTHS[mi];
 
  if (supTab==='media') renderSupMedia(mi, mkey);
  else renderSupTime(mi, mkey);
}
 
function renderSupMedia(mi, mkey) {
  if (!teamData.length) return;
  const keys = ['conversao','churn','reengajamento','cobertura','reunioes','nps'];
 
  // Calculate team averages
  const avgs = {};
  keys.forEach(key=>{
    const vals = teamData.map(m=>{
      const pf = m.perf[mkey]||{};
      const mt = getMetaFor(m.meta,mi);
      return pctKPI(key,pf[key],mt);
    }).filter(v=>v!==null);
    avgs[key] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  });
 
  const globalVals = Object.values(avgs).filter(v=>v!==null).map(v=>Math.min(v,200));
  const gbl = globalVals.length ? globalVals.reduce((a,b)=>a+b,0)/globalVals.length : null;
 
  document.getElementById('supGNumber').textContent = gbl!==null ? f1(gbl)+'%' : '—';
  document.getElementById('supGSub').textContent    = gbl===null ? 'Sem dados' : gbl>=100 ? 'Meta atingida' : `${f1(100-gbl)} p.p. abaixo da meta`;
 
  const circ=214, clamp=gbl!==null?Math.min(gbl,100):0;
  document.getElementById('supArcFill').setAttribute('stroke-dasharray',`${(clamp/100)*circ} ${circ}`);
 
  const BK=[['conversao','Conversão'],['churn','Churn'],['reengajamento','Reengaj.'],['cobertura','Cobertura'],['reunioes','Reuniões'],['nps','NPS']];
  document.getElementById('supGBreakdown').innerHTML = BK.map(([key,label])=>{
    const pv=avgs[key], clampPv=pv!==null?Math.min(pv,100):0;
    const col=pv===null?'rgba(255,255,255,.07)':pv>=100?'#34d399':pv>=75?'#fbbf24':'#f87171';
    return `<div class="gb-row"><span class="gb-name">${label}</span><div class="gb-track"><div class="gb-fill" style="width:${clampPv}%;background:${col}"></div></div><span class="gb-pct">${pv!==null?Math.round(pv)+'%':'—'}</span></div>`;
  }).join('');
 
  const AVG_DEFS=[
    {key:'conversao',name:'Conversão Média'},{key:'churn',name:'Churn Médio'},
    {key:'reengajamento',name:'Reengajamento Médio'},{key:'cobertura',name:'Cobertura Média'},
    {key:'reunioes',name:'Reuniões Médias'},{key:'nps',name:'NPS Médio'},
  ];
  document.getElementById('supAvgGrid').innerHTML = AVG_DEFS.map(d=>{
    const pv=avgs[d.key];
    return `<div class="kpi">
      <span class="dot ${dotClass(pv)}"></span>
      <div class="kpi-name">${d.name}</div>
      <div class="kpi-num">${pv!==null?Math.round(pv)+'%':'—'}</div>
      <div class="kpi-meta">Média do time</div>
    </div>`;
  }).join('');
}
 
function renderSupTime(mi, mkey) {
  if (!teamData.length) {
    document.getElementById('supTeamList').innerHTML='<div class="empty-state">Nenhum colaborador encontrado</div>';
    return;
  }
  const keys=['conversao','churn','reengajamento','cobertura','reunioes','nps'];
  document.getElementById('supTeamList').innerHTML = teamData.map(member=>{
    const pf  = member.perf[mkey]||{};
    const mt  = getMetaFor(member.meta,mi);
    const gbl = globalScore(member.perf,member.meta,mi);
    const chips = keys.slice(0,4).map(key=>{
      const pct=pctKPI(key,pf[key],mt);
      const cls=pct===null?'chip-e':pct>=100?'chip-g':pct>=75?'chip-a':'chip-r';
      const label=key==='conversao'?'Conv':key==='churn'?'Churn':key==='reengajamento'?'Reengaj':key==='cobertura'?'Coberta':'';
      return label?`<span class="chip ${cls}">${label} ${pct!==null?Math.round(pct)+'%':'—'}</span>`:'';
    }).filter(Boolean).join('');
    const pctCls=gbl===null?'n':gbl>=100?'g':gbl>=75?'a':'r';
    const av=initials(member.name);
    return `<div class="cs-row">
      <div class="cs-left">
        <div class="cs-av">${av}</div>
        <div><div class="cs-name">${member.name||'—'}</div><div class="cs-email">${member.email||''}</div></div>
      </div>
      <div class="cs-right">
        <div class="chips">${chips}</div>
        <div class="cs-pct ${pctCls}">${gbl!==null?f1(gbl)+'%':'—'}</div>
        <button class="edit-meta-btn" onclick="openMetaModal('${member.id}','${member.name}')">Editar metas</button>
      </div>
    </div>`;
  }).join('');
}

function openPerfModal(key, name, label, currentVal) {

  document.getElementById('mTitle').textContent = name;

function openMetaModal(userId, userName) {
  modalKey=null; modalUserId=userId;
  const mkey = MONTH_KEYS[activeMonth];
  const member = teamData.find(m=>m.id===userId);
  const mt = (member?.meta[mkey]) || DEFAULT_META;
 
  document.getElementById('mEy').textContent   = 'Metas individuais';
  document.getElementById('mTitle').textContent = `${userName} — ${MONTHS[activeMonth]}`;
  document.getElementById('mFields').innerHTML  = `

    <div class="mfield"><label>Meta Churn — máximo (%)</label><input id="m_churn" type="number" step="0.1" value="${mt.churn??DEFAULT_META.churn}"></div>
    <div class="mfield"><label>Meta Reengajamento (%)</label><input id="m_reengajamento" type="number" step="0.1" value="${mt.reengajamento??DEFAULT_META.reengajamento}"></div>
    <div class="mfield"><label>Meta Cobertura de Carteira (%)</label><input id="m_cobertura" type="number" step="0.1" value="${mt.cobertura??DEFAULT_META.cobertura}"></div>
    <div class="mfield"><label>Meta Reuniões (nº)</label><input id="m_reunioes" type="number" step="1" value="${mt.reunioes??DEFAULT_META.reunioes}"></div>
    <div class="mfield"><label>Meta NPS</label><input id="m_nps" type="number" step="1" value="${mt.nps??DEFAULT_META.nps}"></div>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m_conversao')?.focus(),60);
}
 
function closeModal() { document.getElementById('overlay').classList.remove('open'); modalKey=null; modalUserId=null; }
 
async function saveModal() {
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Salvando...';
 
  let ok=false;
  if (modalUserId) {
    // Supervisor saving custom metas for a CS
    const metaValues={
      conversao:    parseFloat(document.getElementById('m_conversao').value)||DEFAULT_META.conversao,
      churn:        parseFloat(document.getElementById('m_churn').value)||DEFAULT_META.churn,
      reengajamento:parseFloat(document.getElementById('m_reengajamento').value)||DEFAULT_META.reengajamento,
      cobertura:    parseFloat(document.getElementById('m_cobertura').value)||DEFAULT_META.cobertura,
      reunioes:     parseFloat(document.getElementById('m_reunioes').value)||DEFAULT_META.reunioes,
      nps:          parseFloat(document.getElementById('m_nps').value)||DEFAULT_META.nps,
    };
    ok = await saveMetaForUser(modalUserId, metaValues);
  } else {
    // CS saving own performance
    const val=parseFloat(document.getElementById('mInput').value);
    if (!isNaN(val)) ok = await savePerfKPI(modalKey, val);
  }
 
  btn.disabled=false; btn.textContent='Salvar';
  if (ok) { closeModal(); render(); }
}
 
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

async function bootApp(session) {
  currentUser  = session.user;
  isManager    = MANAGER_EMAILS.includes(currentUser.email);
  isSupervisor = SUPERVISOR_EMAILS.includes(currentUser.email);
 
  const name = currentUser.user_metadata?.name || currentUser.email.split('@')[0];
  document.getElementById('userAvatar').textContent = initials(name);
  document.getElementById('userName').textContent   = name;
 
  // Build nav
  let navHTML = '';
  if (isSupervisor) {
    navHTML = `
      <button class="nbtn active" data-suptab="media" onclick="setSupTab('media')">Média do Time</button>
      <button class="nbtn" data-suptab="time" onclick="setSupTab('time')">Gerenciar Time</button>`;
  } else if (isManager) {
    navHTML = `
      <button class="nbtn active" data-view="own" onclick="setView('own')">Minhas Metas</button>
      <button class="nbtn" data-view="sup" onclick="setView('sup')">Ver Time</button>`;
  }
  navHTML += `<button class="logout-btn" onclick="doLogout()">Sair</button>`;
  document.getElementById('navBtns').innerHTML = navHTML;
 
  // Load data
  [userPerf, userMeta] = await Promise.all([
    loadUserPerf(currentUser.id),
    loadUserMeta(currentUser.id),
  ]);
 
  if (isSupervisor) {
    document.getElementById('ownView').style.display='none';
    document.getElementById('supView').style.display='flex';
    await loadTeamData();
  }
 
  showApp();
  render();
}
 
// Session handling
sb.auth.onAuthStateChange(async(event,session)=>{
  if ((event==='INITIAL_SESSION'||event==='SIGNED_IN') && session && !booted) {
    booted=true; await bootApp(session);
  }
  if (event==='SIGNED_OUT') { booted=false; currentUser=null; showAuth(); }
});
 
sb.auth.getSession().then(({data:{session}})=>{
  if (session && !booted) { booted=true; bootApp(session); }
  else if (!session) { showAuth(); }
});
</script>
</body>
