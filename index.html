<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas CS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Sora', sans-serif; background: #f7f6f3; min-height: 100vh; }
#loading { display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:0.75rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#b0ab9e; }
#authScreen { display:none; min-height:100vh; align-items:center; justify-content:center; }
.auth-box { background:#fff; border:1.5px solid #eeece8; border-radius:20px; padding:48px 44px; width:380px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
.auth-logo { font-size:0.65rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#b0ab9e; margin-bottom:8px; }
.auth-title { font-size:1.6rem; font-weight:300; letter-spacing:-0.03em; color:#1c1a17; margin-bottom:32px; line-height:1.2; }
.auth-tabs { display:flex; margin-bottom:28px; border-bottom:1.5px solid #eeece8; }
.auth-tab { padding:8px 20px 12px; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:600; color:#b0ab9e; background:transparent; border:none; cursor:pointer; transition:color 0.15s; margin-bottom:-1.5px; border-bottom:2px solid transparent; }
.auth-tab.active { color:#1c1a17; border-bottom-color:#1c1a17; }
.auth-field { margin-bottom:16px; }
.auth-field label { display:block; font-size:0.62rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#b0ab9e; margin-bottom:6px; }
.auth-field input { width:100%; padding:10px 14px; border:1.5px solid #eeece8; border-radius:10px; font-family:'Sora',sans-serif; font-size:0.92rem; font-weight:300; color:#1c1a17; background:#f7f6f3; outline:none; transition:border-color 0.15s; }
.auth-field input:focus { border-color:#1c1a17; background:#fff; }
.auth-btn { width:100%; padding:12px; margin-top:8px; background:#1c1a17; color:#fff; border:none; border-radius:10px; font-family:'Sora',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
.auth-btn:hover { opacity:0.75; }
.auth-btn:disabled { opacity:0.4; cursor:default; }
.auth-error { margin-top:12px; padding:10px 14px; background:#fff1f2; border:1px solid #fecdd3; border-radius:8px; font-size:0.72rem; color:#be123c; display:none; }
#app { display:none; flex-direction:column; align-items:center; padding:64px 24px 80px; }
.top { width:100%; max-width:860px; display:flex; justify-content:space-between; align-items:center; margin-bottom:56px; }
.top-left { display:flex; flex-direction:column; gap:4px; }
.app-title { font-size:0.75rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#b0ab9e; }
.user-name { font-size:0.82rem; font-weight:600; color:#1c1a17; }
.top-right { display:flex; align-items:center; gap:12px; }
.manager-toggle { display:none; align-items:center; gap:8px; }
.mgr-btn { padding:6px 16px; border-radius:99px; font-size:0.72rem; font-weight:600; border:1.5px solid #eeece8; background:transparent; color:#b0ab9e; cursor:pointer; font-family:'Sora',sans-serif; transition:all 0.15s; }
.mgr-btn.active { background:#1c1a17; color:#fff; border-color:#1c1a17; }
.logout-btn { padding:6px 16px; border-radius:99px; font-size:0.72rem; font-weight:600; border:1.5px solid #eeece8; background:transparent; color:#b0ab9e; cursor:pointer; font-family:'Sora',sans-serif; transition:all 0.15s; }
.logout-btn:hover { border-color:#1c1a17; color:#1c1a17; }
.months { display:flex; gap:6px; }
.mpill { padding:6px 18px; border-radius:99px; font-size:0.75rem; font-weight:600; border:1.5px solid transparent; background:transparent; color:#b0ab9e; cursor:pointer; font-family:'Sora',sans-serif; transition:all 0.18s; }
.mpill.active { background:#1c1a17; color:#fff; border-color:#1c1a17; }
.mpill.disabled { opacity:0.3; cursor:default; }
.mpill:not(.active):not(.disabled):hover { border-color:#1c1a17; color:#1c1a17; }
.month-label { font-size:0.65rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#b0ab9e; margin-bottom:16px; width:100%; max-width:860px; }
.global-card { width:100%; max-width:860px; background:#1c1a17; border-radius:20px; padding:36px 44px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:32px; }
.global-left { display:flex; flex-direction:column; gap:6px; }
.global-eyebrow { font-size:0.62rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#6b6456; }
.global-number { font-size:3.8rem; font-weight:300; letter-spacing:-0.05em; line-height:1; color:#fff; }
.global-sub { font-size:0.7rem; color:#6b6456; margin-top:2px; }
.global-arc { flex-shrink:0; }
.global-breakdown { display:flex; flex-direction:column; gap:10px; min-width:160px; }
.gb-item { display:flex; align-items:center; justify-content:space-between; gap:16px; }
.gb-name { font-size:0.65rem; color:#6b6456; font-weight:400; white-space:nowrap; }
.gb-bar-track { flex:1; height:3px; background:#2e2b26; border-radius:99px; overflow:hidden; }
.gb-bar-fill { height:100%; border-radius:99px; transition:width 0.7s cubic-bezier(.4,0,.2,1); }
.gb-pct { font-size:0.65rem; font-weight:600; color:#fff; min-width:36px; text-align:right; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; width:100%; max-width:860px; }
.kpi { background:#fff; border-radius:16px; padding:32px 28px 28px; position:relative; overflow:hidden; border:1.5px solid #eeece8; transition:box-shadow 0.2s; }
.kpi:hover { box-shadow:0 8px 32px rgba(0,0,0,0.06); }
.kpi-name { font-size:0.65rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#b0ab9e; margin-bottom:20px; }
.kpi-number { font-size:2.8rem; font-weight:300; letter-spacing:-0.04em; line-height:1; color:#1c1a17; }
.kpi-meta { font-size:0.7rem; color:#c8c3ba; margin-top:8px; }
.kpi-status { position:absolute; top:28px; right:24px; width:8px; height:8px; border-radius:50%; }
.s-green { background:#22c55e; }
.s-red { background:#f43f5e; }
.kpi-edit { position:absolute; bottom:0; left:0; right:0; padding:10px; text-align:center; font-size:0.65rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#b0ab9e; background:#f7f6f3; border:none; border-top:1px solid #eeece8; cursor:pointer; font-family:'Sora',sans-serif; opacity:0; transform:translateY(4px); transition:opacity 0.18s,transform 0.18s; }
.kpi:hover .kpi-edit { opacity:1; transform:translateY(0); }
.kpi-edit:hover { color:#1c1a17; background:#f0ede8; }
.manager-view { display:none; width:100%; max-width:860px; }
.mgr-panel { background:#fff; border:1.5px solid #eeece8; border-radius:20px; overflow:hidden; }
.mgr-panel-head { padding:24px 28px; border-bottom:1px solid #eeece8; font-size:0.65rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#b0ab9e; }
.mgr-table { width:100%; border-collapse:collapse; }
.mgr-table th { padding:10px 20px; text-align:left; font-size:0.62rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#b0ab9e; background:#f7f6f3; border-bottom:1px solid #eeece8; }
.mgr-table th:not(:first-child) { text-align:center; }
.mgr-table td { padding:14px 20px; font-size:0.8rem; border-bottom:1px solid #eeece8; color:#6b6456; text-align:center; }
.mgr-table td:first-child { text-align:left; font-weight:600; color:#1c1a17; }
.mgr-table tr:last-child td { border-bottom:none; }
.mgr-table tr:hover td { background:#faf9f7; }
.chip { display:inline-block; padding:2px 10px; border-radius:99px; font-size:0.7rem; font-weight:600; }
.chip-g { background:#f0fdf4; color:#16803c; border:1px solid #bbf7d0; }
.chip-r { background:#fff1f2; color:#be123c; border:1px solid #fecdd3; }
.chip-a { background:#fffbeb; color:#b45309; border:1px solid #fde68a; }
.chip-e { background:#f7f6f3; color:#b0ab9e; border:1px solid #eeece8; }
.empty-state { padding:48px; text-align:center; font-size:0.75rem; color:#b0ab9e; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; }
.overlay { display:none; position:fixed; inset:0; background:rgba(28,26,23,0.35); backdrop-filter:blur(8px); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:#fff; border-radius:20px; padding:36px; width:340px; box-shadow:0 32px 80px rgba(0,0,0,0.12); animation:up 0.22s cubic-bezier(.4,0,.2,1); }
@keyframes up { from{opacity:0;transform:translateY(12px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);} }
.modal h3 { font-size:0.65rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#b0ab9e; margin-bottom:6px; }
.modal p { font-size:1.05rem; font-weight:400; color:#1c1a17; margin-bottom:24px; }
.mfield { margin-bottom:16px; }
.mfield label { display:block; font-size:0.62rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#b0ab9e; margin-bottom:6px; }
.mfield input { width:100%; padding:10px 14px; border:1.5px solid #eeece8; border-radius:10px; font-family:'Sora',sans-serif; font-size:1rem; font-weight:300; color:#1c1a17; background:#f7f6f3; outline:none; transition:border-color 0.15s; }
.mfield input:focus { border-color:#1c1a17; background:#fff; }
.mactions { display:flex; gap:8px; margin-top:24px; }
.btn-save { flex:1; padding:11px; background:#1c1a17; color:#fff; border:none; border-radius:10px; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
.btn-save:hover { opacity:0.75; }
.btn-save:disabled { opacity:0.4; cursor:default; }
.btn-cancel { padding:11px 18px; background:transparent; color:#b0ab9e; border:1.5px solid #eeece8; border-radius:10px; font-family:'Sora',sans-serif; font-size:0.78rem; cursor:pointer; transition:all 0.15s; }
.btn-cancel:hover { color:#1c1a17; border-color:#1c1a17; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
.kpi { animation:fadeUp 0.4s ease both; }
.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.10s}.kpi:nth-child(3){animation-delay:.15s}
.kpi:nth-child(4){animation-delay:.20s}.kpi:nth-child(5){animation-delay:.25s}.kpi:nth-child(6){animation-delay:.30s}
</style>
</head>
<body>

<div id="loading">Carregando...</div>

<div id="authScreen" style="display:none;min-height:100vh;align-items:center;justify-content:center;">
  <div class="auth-box">
    <div class="auth-logo">Customer Success · Metas 2026</div>
    <div class="auth-title">Bem-vindo</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('signup')">Criar conta</button>
    </div>
    <div id="loginForm">
      <div class="auth-field"><label>E-mail</label><input id="loginEmail" type="email" placeholder="seu@email.com"></div>
      <div class="auth-field"><label>Senha</label><input id="loginPass" type="password" placeholder="••••••••"></div>
      <button class="auth-btn" onclick="doLogin()">Entrar</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="auth-field"><label>Nome</label><input id="signupName" type="text" placeholder="Seu nome"></div>
      <div class="auth-field"><label>E-mail</label><input id="signupEmail" type="email" placeholder="seu@email.com"></div>
      <div class="auth-field"><label>Senha</label><input id="signupPass" type="password" placeholder="mín. 6 caracteres"></div>
      <button class="auth-btn" onclick="doSignup()">Criar conta</button>
    </div>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column;align-items:center;padding:64px 24px 80px;">
  <div class="top" style="width:100%;max-width:860px;display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;">
    <div class="top-left">
      <div class="app-title">Customer Success · Metas 2026</div>
      <div class="user-name" id="userName"></div>
    </div>
    <div class="top-right">
      <div class="manager-toggle" id="managerToggle">
        <button class="mgr-btn active" onclick="setView('own')">Minhas Metas</button>
        <button class="mgr-btn" onclick="setView('team')">Ver Time</button>
      </div>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div style="width:100%;max-width:860px;display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;">
    <div class="month-label" id="monthLabel" style="margin-bottom:0"></div>
    <div class="months" id="months"></div>
  </div>
  <div id="ownView" style="width:100%;max-width:860px;">
    <div class="global-card">
      <div class="global-left">
        <div class="global-eyebrow">Meta Global</div>
        <div class="global-number" id="globalNumber">—</div>
        <div class="global-sub" id="globalSub">—</div>
      </div>
      <svg class="global-arc" id="globalArc" width="96" height="96" viewBox="0 0 96 96"></svg>
      <div class="global-breakdown" id="globalBreakdown"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="manager-view" id="managerView">
    <div class="mgr-panel">
      <div class="mgr-panel-head">Visão do Time — <span id="mgrMonthLabel"></span></div>
      <table class="mgr-table">
        <thead>
          <tr>
            <th>Colaborador</th><th>Conversão</th><th>Churn</th><th>Reengaj.</th>
            <th>Cobertura</th><th>Reuniões</th><th>NPS</th><th>Global</th>
          </tr>
        </thead>
        <tbody id="mgrBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="mLabel"></h3>
    <p id="mTitle"></p>
    <div id="mFields"></div>
    <div class="mactions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ⚠️ PREENCHA COM SEUS DADOS
const SUPABASE_URL    = 'https://cffchxifzanltnlnavir.supabase.co';
const SUPABASE_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmZmNoeGlmemFubHRubG5hdmlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTYzOTEsImV4cCI6MjA4OTU5MjM5MX0._5ixYSI8rgpkyzHnCRxblgGpOdpalo0ODsBqb8to8DU';
const MANAGER_EMAILS  = ['pedro.cretes@clint.digital'];

const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MONTHS     = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTH_KEYS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const META = { conversao:60, churn:4, reengajamento:25, cobertura:70, reunioes:[80,72,80,80,80,80,80,80,80,80,80,80], nps:60 };

let currentUser=null, isManager=false, activeMonth=new Date().getMonth();
let currentView='own', modalKey=null, userPerf={}, teamData=[];

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').style.display  = tab==='login'  ? 'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block':'none';
  hideAuthError();
}
function showAuthError(msg){const el=document.getElementById('authError');el.textContent=msg;el.style.display='block';}
function hideAuthError(){document.getElementById('authError').style.display='none';}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim(), pass=document.getElementById('loginPass').value;
  if(!email||!pass) return showAuthError('Preencha e-mail e senha.');
  const btn=document.querySelector('#loginForm .auth-btn');
  btn.disabled=true; btn.textContent='Entrando...';
  const {error}=await sbClient.auth.signInWithPassword({email,password:pass});
  btn.disabled=false; btn.textContent='Entrar';
  if(error) showAuthError('E-mail ou senha incorretos.');
}

async function doSignup(){
  const name=document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  if(!name||!email||!pass) return showAuthError('Preencha todos os campos.');
  if(pass.length<6) return showAuthError('Senha deve ter ao menos 6 caracteres.');
  const btn=document.querySelector('#signupForm .auth-btn');
  btn.disabled=true; btn.textContent='Criando...';
  const {error}=await sbClient.auth.signUp({email,password:pass,options:{data:{name}}});
  btn.disabled=false; btn.textContent='Criar conta';
  if(error) return showAuthError('Erro: '+error.message);
  const el=document.getElementById('authError');
  el.textContent='Conta criada! Verifique seu e-mail.';
  el.style.cssText='display:block;background:#f0fdf4;color:#16803c;border-color:#bbf7d0';
}

async function doLogout(){await sbClient.auth.signOut();}

function emptyPerf(){
  const p={};
  MONTH_KEYS.forEach(k=>{p[k]={conversao:null,churn:null,reengajamento:null,cobertura:null,reunioes:null,nps:null};});
  return p;
}

async function loadUserPerf(userId){
  const {data}=await sbClient.from('metricas').select('*').eq('user_id',userId);
  const p=emptyPerf();
  if(data) data.forEach(row=>{if(p[row.mes]) Object.assign(p[row.mes],{conversao:row.conversao,churn:row.churn,reengajamento:row.reengajamento,cobertura:row.cobertura,reunioes:row.reunioes,nps:row.nps});});
  return p;
}

async function savePerf(key,value){
  const mes=MONTH_KEYS[activeMonth];
  const {error}=await sbClient.from('metricas').upsert({user_id:currentUser.id,mes,...userPerf[mes],[key]:value},{onConflict:'user_id,mes'});
  if(!error){userPerf[mes][key]=value; render();}
  return !error;
}

async function loadTeamData(){
  const {data:profiles}=await sbClient.from('profiles').select('id,name,email');
  const {data:metricas}=await sbClient.from('metricas').select('*');
  if(!profiles||!metricas) return;
  teamData=profiles.map(profile=>{
    const p=emptyPerf();
    metricas.filter(m=>m.user_id===profile.id).forEach(row=>{if(p[row.mes]) Object.assign(p[row.mes],{conversao:row.conversao,churn:row.churn,reengajamento:row.reengajamento,cobertura:row.cobertura,reunioes:row.reunioes,nps:row.nps});});
    return {name:profile.name,email:profile.email,perf:p};
  });
}

function pctKPI(key,val,mi){
  if(val===null||val===undefined) return null;
  if(key==='churn') return META.churn/val*100;
  if(key==='reunioes') return val/META.reunioes[mi]*100;
  return val/META[key]*100;
}

function globalScore(perfMonth,mi){
  const keys=['conversao','churn','reengajamento','cobertura','reunioes','nps'];
  const vals=keys.map(k=>pctKPI(k,perfMonth[k],mi)).filter(v=>v!==null);
  if(!vals.length) return null;
  return vals.map(v=>Math.min(v,200)).reduce((a,b)=>a+b,0)/vals.length;
}

function f1(v){return v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1});}
function chipClass(pct){if(pct===null)return 'chip-e';if(pct>=100)return 'chip-g';if(pct>=75)return 'chip-a';return 'chip-r';}

function render(){
  const mi=activeMonth, mkey=MONTH_KEYS[mi], mp=userPerf[mkey]||{};
  document.getElementById('monthLabel').textContent=MONTHS[mi];
  document.getElementById('mgrMonthLabel').textContent=MONTHS[mi];
  document.getElementById('months').innerHTML=MONTHS.map((m,i)=>{
    const future=i>new Date().getMonth(), active=i===activeMonth;
    const cls=active?'active':future?'disabled':'';
    const action=(!future&&!active)?`onclick="setMonth(${i})"` :'';
    return `<button class="mpill ${cls}" ${action}>${m.slice(0,3)}</button>`;
  }).join('');
  if(currentView==='own') renderOwn(mi,mkey,mp); else renderTeam(mi);
}

function renderOwn(mi,mkey,mp){
  const gbl=globalScore(mp,mi);
  document.getElementById('globalNumber').textContent=gbl!==null?f1(gbl)+'%':'—';
  document.getElementById('globalSub').textContent=gbl===null?'Sem dados':gbl>=100?'Meta atingida':`${f1(100-gbl)} p.p. abaixo da meta`;
  const R=36,cx=48,cy=48,circ=2*Math.PI*R,clamp=gbl!==null?Math.min(gbl,100):0;
  const arcColor=gbl===null?'#2e2b26':gbl>=100?'#4ade80':gbl>=75?'#fbbf24':'#f87171';
  document.getElementById('globalArc').innerHTML=`
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#2e2b26" stroke-width="7"/>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${arcColor}" stroke-width="7"
      stroke-linecap="round" stroke-dasharray="${(clamp/100)*circ} ${circ}"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray 0.8s cubic-bezier(.4,0,.2,1)"/>`;
  const BK=[{key:'conversao',label:'Conversão'},{key:'churn',label:'Churn'},{key:'reengajamento',label:'Reengaj.'},{key:'cobertura',label:'Cobertura'},{key:'reunioes',label:'Reuniões'},{key:'nps',label:'NPS'}];
  document.getElementById('globalBreakdown').innerHTML=BK.map(({key,label})=>{
    const pv=pctKPI(key,mp[key],mi),clampPv=pv!==null?Math.min(pv,100):0;
    const col=pv===null?'#2e2b26':pv>=100?'#4ade80':pv>=75?'#fbbf24':'#f87171';
    return `<div class="gb-item"><span class="gb-name">${label}</span><div class="gb-bar-track"><div class="gb-bar-fill" style="width:${clampPv}%;background:${col}"></div></div><span class="gb-pct">${pv!==null?Math.round(pv)+'%':'—'}</span></div>`;
  }).join('');
  const KPI_DEFS=[
    {key:'conversao',name:'Conversão de Renovação',fmt:v=>v+'%',meta:`Meta ${META.conversao}%`,label:'Realizado (%)'},
    {key:'churn',name:'Churn do Período',fmt:v=>v+'%',meta:`Meta ≤ ${META.churn}%`,label:'Churn realizado (%)'},
    {key:'reengajamento',name:'Taxa de Reengajamento',fmt:v=>v+'%',meta:`Meta ${META.reengajamento}%`,label:'Realizado (%)'},
    {key:'cobertura',name:'Cobertura de Carteira',fmt:v=>v+'%',meta:`Meta ${META.cobertura}%`,label:'Clientes contatados (%)'},
    {key:'reunioes',name:'Reuniões Realizadas',fmt:v=>String(v),meta:`Meta ${META.reunioes[mi]}`,label:'Reuniões realizadas'},
    {key:'nps',name:'NPS',fmt:v=>String(v),meta:`Meta ${META.nps}`,label:'NPS alcançado'},
  ];
  document.getElementById('grid').innerHTML=KPI_DEFS.map(d=>{
    const val=mp[d.key],pct=pctKPI(d.key,val,mi),hit=pct!==null&&pct>=100,noData=val===null||val===undefined;
    return `<div class="kpi">
      <span class="kpi-status ${noData?'':hit?'s-green':'s-red'}" style="${noData?'background:#e5e0d8':''}"></span>
      <div class="kpi-name">${d.name}</div>
      <div class="kpi-number">${noData?'—':d.fmt(val)}</div>
      <div class="kpi-meta">${d.meta}</div>
      <button class="kpi-edit" onclick="openModal('${d.key}','${d.name}','${d.label}')">Editar</button>
    </div>`;
  }).join('');
}

function renderTeam(mi){
  const mkey=MONTH_KEYS[mi],COLS=['conversao','churn','reengajamento','cobertura','reunioes','nps'];
  if(!teamData.length){document.getElementById('mgrBody').innerHTML=`<tr><td colspan="8"><div class="empty-state">Nenhum colaborador encontrado</div></td></tr>`;return;}
  document.getElementById('mgrBody').innerHTML=teamData.map(member=>{
    const mp=member.perf[mkey]||{},gbl=globalScore(mp,mi);
    const cells=COLS.map(key=>{const pct=pctKPI(key,mp[key],mi);return `<td><span class="chip ${chipClass(pct)}">${pct!==null?Math.round(pct)+'%':'—'}</span></td>`;}).join('');
    return `<tr><td>${member.name}</td>${cells}<td><span class="chip ${chipClass(gbl)}">${gbl!==null?f1(gbl)+'%':'—'}</span></td></tr>`;
  }).join('');
}

function setMonth(i){activeMonth=i;render();}

function setView(v){
  currentView=v;
  document.getElementById('ownView').style.display=v==='own'?'block':'none';
  document.getElementById('managerView').style.display=v==='team'?'block':'none';
  document.querySelectorAll('.mgr-btn').forEach((btn,i)=>btn.classList.toggle('active',(i===0&&v==='own')||(i===1&&v==='team')));
  if(v==='team') loadTeamData().then(render); else render();
}

function openModal(key,name,label){
  modalKey=key;
  const val=userPerf[MONTH_KEYS[activeMonth]][key];
  document.getElementById('mLabel').textContent=MONTHS[activeMonth];
  document.getElementById('mTitle').textContent=name;
  document.getElementById('mFields').innerHTML=`<div class="mfield"><label>${label}</label><input id="mInput" type="number" step="0.01" value="${val??''}"></div>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('mInput')?.focus(),60);
}

function closeModal(){document.getElementById('overlay').classList.remove('open');modalKey=null;}

async function saveModal(){
  const val=parseFloat(document.getElementById('mInput').value);
  if(isNaN(val)) return;
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Salvando...';
  await savePerf(modalKey,val);
  btn.disabled=false; btn.textContent='Salvar';
  closeModal();
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay')) closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});

async function bootApp(session){
  currentUser=session.user;
  isManager=MANAGER_EMAILS.includes(currentUser.email);
  if(isManager) document.getElementById('managerToggle').style.display='flex';
  document.getElementById('userName').textContent=currentUser.user_metadata?.name||currentUser.email.split('@')[0];
  userPerf=await loadUserPerf(currentUser.id);
  document.getElementById('loading').style.display='none';
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}

sbClient.auth.onAuthStateChange(async(event,session)=>{
  if(session){await bootApp(session);}
  else{
    currentUser=null;
    document.getElementById('loading').style.display='none';
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// Recupera sessão existente ao carregar
sbClient.auth.getSession().then(({data:{session}})=>{
  if(session) bootApp(session);
  else{
    document.getElementById('loading').style.display='none';
    document.getElementById('authScreen').style.display='flex';
  }
});
});
</script>
</body>
</html>
