<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas CS · Clint</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Sora,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
 
/* DARK (default) */
:root{
  --bg:#0D0818;
  --bg2:#130D22;
  --surface:#1A1235;
  --surface2:#221848;
  --border:rgba(255,255,255,.22);
  --border2:rgba(255,255,255,.12);
  --text:#ffffff;
  --text2:rgba(255,255,255,.6);
  --text3:rgba(255,255,255,.35);
  --text4:rgba(255,255,255,.4);
  --global-card:#1c1a17;
  --global-text:#6b6456;
  --kpi-edit:#221848;
  --note-bg:rgba(139,33,232,.1);
  --note-c:rgba(167,139,250,.9);
  --note-b:rgba(139,33,232,.2);
  --chip-e-bg:rgba(255,255,255,.04);
  --chip-e-c:rgba(255,255,255,.3);
  --chip-e-b:rgba(255,255,255,.22);
  --bar-track:rgba(255,255,255,.07);
  --input-bg:#130D22;
  --shadow:none;
}
 
/* LIGHT */
[data-theme="light"]{
  --bg:#f7f6f3;
  --bg2:#f0ede8;
  --surface:#ffffff;
  --surface2:#f0ede8;
  --border:#dedad4;
  --border2:#e8e4de;
  --text:#1c1a17;
  --text2:#3d3830;
  --text3:#7a7468;
  --text4:#7a7468;
  --global-card:#1c1a17;
  --global-text:#6b6456;
  --kpi-edit:#f0ede8;
  --note-bg:#fffbeb;
  --note-c:#b45309;
  --note-b:#fde68a;
  --chip-e-bg:#eeece8;
  --chip-e-c:#7a7468;
  --chip-e-b:#dedad4;
  --bar-track:rgba(0,0,0,.08);
  --input-bg:#f7f6f3;
  --shadow:0 4px 20px rgba(0,0,0,.06);
}
 
/* LIGHT MODE OVERRIDES */
[data-theme="light"] .kpi-name{color:#6b6458}
[data-theme="light"] .kpi-num{color:#1c1a17;font-weight:400}
[data-theme="light"] .kpi-meta{color:#7a7468}
[data-theme="light"] .month-label{color:#7a7468}
[data-theme="light"] .mpill{color:#7a7468}
[data-theme="light"] .mpill.active{background:#1c1a17;color:#fff;border-color:#1c1a17}
[data-theme="light"] .username{color:#1c1a17}
[data-theme="light"] .nbtn{color:#6b6458;border-color:#dedad4}
[data-theme="light"] .logout-btn{color:#7a7468;border-color:#dedad4}
[data-theme="light"] .sup-head{color:#6b6458}
[data-theme="light"] .cs-name{color:#1c1a17}
[data-theme="light"] .cs-email{color:#7a7468}
[data-theme="light"] .clint-name{color:#1c1a17}
[data-theme="light"] .clint-sub{color:#7a7468}
[data-theme="light"] .gb-pct{color:#3d3830}
[data-theme="light"] .cs-pct.n{color:#7a7468}
[data-theme="light"] .kpi{box-shadow:0 2px 12px rgba(0,0,0,.06)}
[data-theme="light"] .sup-panel{box-shadow:0 2px 12px rgba(0,0,0,.06)}
[data-theme="light"] #themeBtn{color:#7a7468;border-color:#dedad4}
 
/* AUTH */
#authScreen{display:flex;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.auth-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.auth-logo-img{width:56px;height:56px;border-radius:14px}
.auth-logo-name{font-size:1.1rem;font-weight:700;color:#fff}
.auth-logo-sub{font-size:.6rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:360px}
.auth-title{font-size:1.3rem;font-weight:300;color:#fff;margin-bottom:24px}
.auth-tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--border)}
.auth-tab{padding:6px 18px 10px;font-family:Sora,sans-serif;font-size:.75rem;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;margin-bottom:-1px;border-bottom:2px solid transparent}
.auth-tab.active{color:#fff;border-bottom-color:#8B21E8}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);margin-bottom:4px}
.auth-field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-family:Sora,sans-serif;font-size:.88rem;font-weight:300;color:#fff;background:var(--input-bg);outline:none}
.auth-field input:focus{border-color:#8B21E8}
.auth-btn{width:100%;padding:11px;margin-top:6px;background:linear-gradient(135deg,#8B21E8,#C832D8);color:#fff;border:none;border-radius:9px;font-family:Sora,sans-serif;font-size:.82rem;font-weight:600;cursor:pointer}
.auth-btn:disabled{opacity:.5;cursor:default}
.auth-msg{margin-top:10px;padding:9px 12px;border-radius:8px;font-size:.72rem;display:none}
.auth-msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:#f87171}
.auth-msg.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);color:#34d399}
 
/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.clint-bar{display:flex;justify-content:center;align-items:center;gap:10px;padding:13px 24px;background:#0D0818;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.clint-logo{width:28px;height:28px;border-radius:7px}
.clint-name{font-size:.8rem;font-weight:700;color:#fff}
.clint-sub{font-size:.52rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:1px}
.user-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 40px;background:var(--surface);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#8B21E8,#C832D8);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#fff}
.username{font-size:.85rem;font-weight:600;color:#fff}
.nav{display:flex;align-items:center;gap:8px}
.nbtn{padding:6px 16px;border-radius:99px;font-size:.7rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:Sora,sans-serif}
.nbtn.active{background:linear-gradient(135deg,#8B21E8,#C832D8);color:#fff;border-color:transparent}
.logout-btn{padding:6px 14px;border-radius:99px;font-size:.7rem;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text4);cursor:pointer;font-family:Sora,sans-serif}
.content{display:flex;flex-direction:column;align-items:center;padding:36px 24px 80px}
.inner{width:100%;max-width:900px;display:flex;flex-direction:column;gap:14px}
.month-row{display:flex;justify-content:space-between;align-items:center}
.month-label{font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.months{display:flex;gap:4px}
.mpill{padding:5px 13px;border-radius:99px;font-size:.68rem;font-weight:500;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;font-family:Sora,sans-serif}
.mpill.active{background:var(--surface2);color:#fff;border-color:var(--border)}
.mpill.locked{opacity:.2;cursor:default}
.global-card{background:#1c1a17;border:1px solid var(--border);border-radius:20px;padding:30px 38px;display:flex;align-items:center;justify-content:space-between;gap:28px;position:relative;overflow:hidden}
.global-card::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(139,33,232,.2) 0%,transparent 70%);pointer-events:none}
.g-ey{font-size:.56rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;background:linear-gradient(135deg,#8B21E8,#C832D8,#F5B731);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.g-num{font-size:3.4rem;font-weight:300;letter-spacing:-.04em;line-height:1;color:#fff}
.g-sub{font-size:.68rem;color:#6b6456;margin-top:3px}
.g-arc{flex-shrink:0}
.g-bd{display:flex;flex-direction:column;gap:8px;min-width:155px}
.gb-row{display:flex;align-items:center;gap:10px}
.gb-name{font-size:.6rem;color:#6b6456;font-weight:500;width:60px;flex-shrink:0}
.gb-track{flex:1;height:3px;background:var(--bar-track);border-radius:99px;overflow:hidden}
.gb-fill{height:100%;border-radius:99px;transition:width .7s}
.gb-pct{font-size:.6rem;font-weight:600;color:rgba(255,255,255,.5);min-width:32px;text-align:right}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px}
.kpi{background:var(--surface);border:1.5px solid var(--border);border-radius:15px;padding:22px 20px 18px;position:relative;overflow:visible}
.kpi:hover{border-color:rgba(139,33,232,.3)}
.kpi-name{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.kpi-num{font-size:2.3rem;font-weight:300;letter-spacing:-.03em;line-height:1;color:#fff}
.kpi-meta{font-size:.65rem;color:var(--text3);margin-top:5px}
.dot{position:absolute;top:20px;right:18px;width:7px;height:7px;border-radius:50%}
.dot-g{background:#34d399;box-shadow:0 0 8px rgba(52,211,153,.4)}
.dot-a{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.4)}
.dot-r{background:#f87171;box-shadow:0 0 8px rgba(248,113,113,.4)}
.dot-e{background:rgba(255,255,255,.2)}
.kpi-edit{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 13px 13px;padding:7px;text-align:center;font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);background:var(--surface2);border:none;border-top:1px solid var(--border);cursor:pointer;font-family:Sora,sans-serif;opacity:0;transform:translateY(4px);transition:opacity .18s,transform .18s}
.kpi:hover .kpi-edit{opacity:1;transform:translateY(0)}
.note{padding:9px 15px;background:var(--note-bg);border:1px solid var(--note-b);border-radius:9px;font-size:.68rem;color:var(--note-c);font-weight:500}
.sup-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;overflow:hidden}
.sup-head{padding:16px 26px;border-bottom:1px solid var(--border);font-size:.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.cs-row{display:flex;align-items:center;justify-content:space-between;padding:13px 26px;border-bottom:1px solid rgba(255,255,255,.04)}
.cs-row:last-child{border-bottom:none}
.cs-row:hover{background:var(--surface2)}
.cs-left{display:flex;align-items:center;gap:11px}
.cs-av{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#8B21E8,#C832D8);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#fff;flex-shrink:0}
.cs-name{font-size:.8rem;font-weight:600;color:#fff}
.cs-email{font-size:.62rem;color:var(--text3);margin-top:1px}
.cs-right{display:flex;align-items:center;gap:11px;flex-wrap:wrap;justify-content:flex-end}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{display:inline-block;padding:2px 7px;border-radius:99px;font-size:.6rem;font-weight:600}
.chip-g{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.chip-a{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.chip-r{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.chip-e{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border)}
.cs-pct{font-size:.82rem;font-weight:600;min-width:42px;text-align:right}
.cs-pct.g{color:#34d399}.cs-pct.a{color:#fbbf24}.cs-pct.r{color:#f87171}.cs-pct.n{color:var(--text3)}
.edit-meta-btn{padding:5px 11px;border-radius:7px;font-size:.6rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text4);cursor:pointer;font-family:Sora,sans-serif;white-space:nowrap}
.edit-meta-btn:hover{background:linear-gradient(135deg,#8B21E8,#C832D8);color:#fff;border-color:transparent}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:380px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.m-ey{font-size:.56rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:linear-gradient(135deg,#8B21E8,#C832D8,#F5B731);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.m-title{font-size:.95rem;font-weight:500;color:#fff;margin-bottom:18px}
.mfields{display:flex;flex-direction:column;gap:9px}
.mfield label{display:block;font-size:.56rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);margin-bottom:3px}
.mfield input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:Sora,sans-serif;font-size:.85rem;font-weight:300;color:#fff;background:var(--input-bg);outline:none}
.mfield input:focus{border-color:#8B21E8}
.mactions{display:flex;gap:7px;margin-top:18px}
.btn-save{flex:1;padding:9px;background:linear-gradient(135deg,#8B21E8,#C832D8);color:#fff;border:none;border-radius:8px;font-family:Sora,sans-serif;font-size:.78rem;font-weight:600;cursor:pointer}
.btn-save:disabled{opacity:.4;cursor:default}
.btn-cancel{padding:9px 15px;background:transparent;color:var(--text4);border:1px solid var(--border);border-radius:8px;font-family:Sora,sans-serif;font-size:.78rem;cursor:pointer}
.kpi-pace-corner{position:absolute;bottom:18px;right:12px;font-size:.68rem;color:#8B21E8;font-weight:600;background:rgba(139,33,232,.12);padding:2px 8px;border-radius:5px;pointer-events:none}
.kpi-pace-ok{color:#34d399!important;background:rgba(52,211,153,.1)!important}
.empty-state{padding:40px;text-align:center;font-size:.7rem;color:var(--text3);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
 
/* ── NOTION-STYLE CALENDAR ── */
.cal-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-top:24px}
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.cal-header-title{font-size:.72rem;font-weight:600;color:var(--text)}
.cal-header-count{font-size:.7rem;font-weight:600;color:#8B21E8;background:rgba(139,33,232,.1);padding:3px 10px;border-radius:99px;border:1px solid rgba(139,33,232,.2)}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-th{font-size:.58rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:left;padding:10px 12px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border2)}
.cal-th:last-child{border-right:none}
.cal-td{width:14.28%;vertical-align:top;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.cal-td:last-child{border-right:none}
.cal-td.empty{opacity:.25;cursor:default;pointer-events:none}
.cal-td.today .cal-day-num{color:#fff;background:#8B21E8;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-td.has-meet{background:rgba(139,33,232,.04)}
.cal-td:not(.empty):hover{background:var(--surface2)}
.cal-day-inner{padding:8px 10px;min-height:80px}
.cal-day-num{font-size:.75rem;font-weight:600;color:var(--text3);margin-bottom:4px;line-height:1}
.cal-meet-chip{font-size:.62rem;color:var(--text2);background:rgba(139,33,232,.15);border:1px solid rgba(139,33,232,.25);border-radius:4px;padding:2px 6px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block}
.cal-meet-more{font-size:.58rem;color:#8B21E8;font-weight:600;padding:1px 0}
/* Day modal */
.day-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);z-index:600;align-items:center;justify-content:center}
.day-overlay.open{display:flex}
.day-modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:min(440px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 32px 64px rgba(0,0,0,.4)}
.day-modal-eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:linear-gradient(135deg,#8B21E8,#C832D8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.day-modal-date{font-size:1.05rem;font-weight:500;color:var(--text);margin-bottom:18px}
.day-close{float:right;background:transparent;border:none;color:var(--text3);font-size:1.1rem;cursor:pointer;margin-top:-4px;padding:0 4px}
.day-meet-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px}
.day-meet-bullet{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#8B21E8,#C832D8);flex-shrink:0}
.day-meet-input{flex:1;background:transparent;border:none;outline:none;font-family:Sora,sans-serif;font-size:.8rem;color:var(--text)}
.day-meet-del{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:2px 4px;flex-shrink:0;transition:color .15s}
.day-meet-del:hover{color:#f87171}
.day-add-row{display:flex;gap:8px;margin-top:12px}
.day-add-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-family:Sora,sans-serif;font-size:.82rem;color:var(--text);background:var(--input-bg);outline:none;transition:border-color .15s}
.day-add-input:focus{border-color:#8B21E8}
.day-add-btn{padding:9px 16px;background:linear-gradient(135deg,#8B21E8,#C832D8);color:#fff;border:none;border-radius:9px;font-family:Sora,sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap}
.day-empty-msg{font-size:.72rem;color:var(--text3);padding:4px 0;font-style:italic}
</style>
</head>
<body>

async function GET(table, query='') {
  // Refresh token if needed
  const {data:{session}} = await sbClient.auth.getSession();
  if (session?.access_token) currentToken = session.access_token;
  const res = await fetch(SB_URL+'/rest/v1/'+table+'?'+(query?query+'&':'')+'select=*', {
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+(currentToken||SB_KEY),
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) return [];
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}
 
async function UPSERT(table, row) {
  const mes = row.mes;
  const uid = row.user_id;
  // Always get fresh token to avoid 401 expired token errors
  const {data:{session}} = await sbClient.auth.getSession();
  if (session?.access_token) currentToken = session.access_token;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer '+(currentToken||SB_KEY),
    'Content-Type': 'application/json'
  };
 
  // Check if row exists
  const check = await fetch(SB_URL+'/rest/v1/'+table+'?user_id=eq.'+uid+'&mes=eq.'+mes+'&select=id', { headers });
  const existing = check.ok ? await check.json() : [];
  console.log('UPSERT check:', table, 'exists:', existing.length, 'token:', currentToken?'ok':'MISSING');
 
  if (existing.length > 0) {
    // UPDATE
    const res = await fetch(SB_URL+'/rest/v1/'+table+'?user_id=eq.'+uid+'&mes=eq.'+mes, {
      method: 'PATCH',
      headers: {...headers, 'Prefer': 'return=minimal'},
      body: JSON.stringify(row)
    });
    console.log('PATCH status:', res.status);
    return res.ok;
  } else {
    // INSERT
    const res = await fetch(SB_URL+'/rest/v1/'+table, {
      method: 'POST',
      headers: {...headers, 'Prefer': 'return=minimal'},
      body: JSON.stringify(row)
    });
    console.log('INSERT status:', res.status);
    return res.ok;
  }
}
 
// ── AUTH ──────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').style.display  = tab==='login'  ?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup' ?'block':'none';
  hideMsg();
}
 
function showMsg(msg, type='error') {
  const el=document.getElementById('authMsg');
  el.textContent=msg; el.className='auth-msg '+type; el.style.display='block';
}
function hideMsg(){ document.getElementById('authMsg').style.display='none'; }
 
async function doLogin() {
  const email=document.getElementById('loginEmail').value.trim();
  const pass =document.getElementById('loginPass').value;
  if (!email||!pass) return showMsg('Preencha e-mail e senha.');
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='Entrando...';
  const {data,error} = await sbClient.auth.signInWithPassword({email,password:pass});
  if (error) { btn.disabled=false; btn.textContent='Entrar'; showMsg('E-mail ou senha incorretos.'); return; }
  btn.disabled=false; btn.textContent='Entrar';
  await boot(data.session);
}
 
async function doSignup() {
  const name =document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass =document.getElementById('signupPass').value;
  if (!name||!email||!pass) return showMsg('Preencha todos os campos.');
  if (pass.length<6) return showMsg('Senha mínimo 6 caracteres.');
  const btn=document.getElementById('signupBtn');
  btn.disabled=true; btn.textContent='Criando...';
  const {data,error} = await sbClient.auth.signUp({email,password:pass,options:{data:{name}}});
  btn.disabled=false; btn.textContent='Criar conta';
  if (error) return showMsg('Erro: '+error.message);
  if (data?.session) { await boot(data.session); return; }
  showMsg('Conta criada! Entre com seu e-mail e senha.','success');
  switchTab('login');
}
 
async function doLogout() {
  await sbClient.auth.signOut();
  user=null; uPerf={}; uMeta={}; teamData=[];
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}
 
// ── BOOT ──────────────────────────────────────
async function boot(session) {
  user   = session.user;
  currentToken = session.access_token;
  isSup  = SUPERVISOR.includes(user.email);
  isMgr  = MANAGERS.includes(user.email);
 
  const name = user.user_metadata?.name || user.email.split('@')[0];
  document.getElementById('userAvatar').textContent = initials(name);
  document.getElementById('userName').textContent   = name;
 
  // Nav buttons
  let nav = '';
  if (isSup) {
    nav = '<button class="nbtn active" onclick="setSupTab(\'media\')">Média do Time</button>' +
          '<button class="nbtn" onclick="setSupTab(\'time\')">Gerenciar Time</button>';
  } else if (isMgr) {
    nav = ['<button class="nbtn active" onclick="setView(this.dataset.v)" data-v="own">Minhas Metas</button>',
            '<button class="nbtn" onclick="setView(this.dataset.v)" data-v="team">Ver Time</button>'].join('');
  }
  nav += '<button class="logout-btn" onclick="doLogout()">Sair</button>';
  document.getElementById('navBtns').innerHTML = nav;
 
  // Load data
  const uid = user.id;
  const [perfRows, metaRows] = await Promise.all([
    GET('metricas','user_id=eq.'+uid),
    GET('metas_usuario','user_id=eq.'+uid)
  ]);
 
  uPerf = buildPerf(Array.isArray(perfRows)?perfRows:[]);
  uMeta = buildMeta(Array.isArray(metaRows)?metaRows:[]);
 
  // Show app
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
 
  if (isSup) {
    await loadTeam();
    document.getElementById('supView').style.display='block';
    document.getElementById('ownView').style.display='none';
  } else {
    document.getElementById('ownView').style.display='block';
    document.getElementById('supView').style.display='none';
  }
 
  render();
}
 
// ── DATA ──────────────────────────────────────
function buildPerf(rows) {
  const p={};
  MKEYS.forEach(k=>{ p[k]={conversao:null,churn:null,reengajamento:null,cobertura:null,reunioes:null,reunioes_nomes:'',nps:null}; });
  rows.forEach(r=>{ if(p[r.mes]) Object.assign(p[r.mes],{conversao:r.conversao,churn:r.churn,reengajamento:r.reengajamento,cobertura:r.cobertura,reunioes:r.reunioes,reunioes_nomes:r.reunioes_nomes||'',nps:r.nps}); });
  return p;
}
 
function buildMeta(rows) {
  const m={};
  MKEYS.forEach(k=>{ m[k]=null; });
  rows.forEach(r=>{ m[r.mes]={conversao:r.conversao,churn:r.churn,reengajamento:r.reengajamento,cobertura:r.cobertura,reunioes:r.reunioes,nps:r.nps}; });
  return m;
}
 
async function loadTeam() {
  const [profiles, metricas, metas] = await Promise.all([
    GET('profiles',''),
    GET('metricas',''),
    GET('metas_usuario','')
  ]);
  const pr = Array.isArray(profiles)?profiles:[];
  const me = Array.isArray(metricas)?metricas:[];
  const ma = Array.isArray(metas)?metas:[];
  teamData = pr.map(p=>({
    id:p.id, name:p.name, email:p.email,
    perf: buildPerf(me.filter(r=>r.user_id===p.id)),
    meta: buildMeta(ma.filter(r=>r.user_id===p.id))
  }));
}
 
// ── CALCULATIONS ──────────────────────────────
function getMeta(metaObj, idx) {
  const m = metaObj && metaObj[MKEYS[idx]];
  return m || DMETA;
}
 
function pct(key, val, meta) {
  if (val===null||val===undefined) return null;
  const m = meta||DMETA;
  if (key==='churn') return m.churn/val*100;
  return val/m[key]*100;
}
 
function globalScore(perf, meta, idx) {
  const mp = perf[MKEYS[idx]]||{};
  const m  = getMeta(meta, idx);
  const vals = ['conversao','churn','reengajamento','cobertura','reunioes','nps']
    .map(k=>pct(k,mp[k],m)).filter(v=>v!==null).map(v=>Math.min(v,200));
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}
 
function dotCls(p) { return p===null?'dot-e':p>=100?'dot-g':p>=75?'dot-a':'dot-r'; }
function chipCls(p){ return p===null?'chip-e':p>=100?'chip-g':p>=75?'chip-a':'chip-r'; }
function f1(v){ return v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}); }
function initials(n){ return (n||'CS').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

  const mkey = MKEYS[mi];
  document.getElementById('monthLabel').textContent = MONTHS[mi];
  document.getElementById('months').innerHTML = MONTHS.map((m,i)=>{
    const future=i>new Date().getMonth(), active=i===mi;
    return `<button class="mpill ${active?'active':future?'locked':''}" ${!future&&!active?`onclick="setMonth(${i})"`:''} >${m.slice(0,3)}</button>`;

  const inTeamView = document.getElementById('supView').style.display !== 'none';

  else renderOwn(mkey);

  const mp   = uPerf[mkey]||{};

    {key:'reengajamento',name:'Taxa de Reengajamento',fmt:v=>v+'%',ml:`Meta ${meta.reengajamento}%`,el:'Realizado (%)'},

    return `<div class="kpi"><span class="dot ${nd?'dot-e':dotCls(p2)}"></span><div class="kpi-name">${d.name}</div><div class="kpi-num">${nd?'—':d.fmt(val)}</div><div class="kpi-meta">${d.ml}</div>${paceEl}<button class="kpi-edit" onclick="openPerfModal('${d.key}','${d.name}','${d.el}',${JSON.stringify(val)})">Editar</button></div>`;

    <div class="cal-wrap">

      </div>

        <thead><tr>
          <th class="cal-th">Dom</th><th class="cal-th">Seg</th><th class="cal-th">Ter</th>
          <th class="cal-th">Qua</th><th class="cal-th">Qui</th><th class="cal-th">Sex</th>
          <th class="cal-th">Sáb</th>
        </tr></thead>
        <tbody id="calDaysGrid"></tbody>
      </table>
    </div>`;
 
  // Render calendar after DOM update
  setTimeout(()=>renderCalendar(null), 0);
}
 
function renderSup(mkey) {
  if (supTab==='media') renderSupMedia(mkey);
  else renderSupTime(mkey);
}
 
function renderSupMedia(mkey) {
  const keys=['conversao','churn','reengajamento','cobertura','reunioes','nps'];
  const avgs={};
  const csOnly = teamData.filter(m=>!SUPERVISOR.includes(m.email));
  keys.forEach(key=>{
    const vals=csOnly.map(m=>{
      const mt=getMeta(m.meta,mi);
      return pct(key,(m.perf[mkey]||{})[key],mt);
    }).filter(v=>v!==null);
    avgs[key]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  });
  const gvals=Object.values(avgs).filter(v=>v!==null).map(v=>Math.min(v,200));
  const gbl=gvals.length?gvals.reduce((a,b)=>a+b,0)/gvals.length:null;
  const circ=214, clamp=gbl!==null?Math.min(gbl,100):0;
 
  const BK=[['conversao','Conversão'],['churn','Churn'],['reengajamento','Reengaj.'],['cobertura','Cobertura'],['reunioes','Reuniões'],['nps','NPS']];
  const bd=BK.map(([k,l])=>{
    const v=avgs[k],cv=v!==null?Math.min(v,100):0;
    const c=v===null?'rgba(255,255,255,.07)':v>=100?'#34d399':v>=75?'#fbbf24':'#f87171';
    return `<div class="gb-row"><span class="gb-name">${l}</span><div class="gb-track"><div class="gb-fill" style="width:${cv}%;background:${c}"></div></div><span class="gb-pct">${v!==null?Math.round(v)+'%':'—'}</span></div>`;
  }).join('');
 
  const AD=[{key:'conversao',name:'Conversão Média'},{key:'churn',name:'Churn Médio'},{key:'reengajamento',name:'Reengajamento Médio'},{key:'cobertura',name:'Cobertura Média'},{key:'reunioes',name:'Reuniões Médias'},{key:'nps',name:'NPS Médio'}];
  const grid=AD.map(d=>`<div class="kpi"><span class="dot ${dotCls(avgs[d.key])}"></span><div class="kpi-name">${d.name}</div><div class="kpi-num">${avgs[d.key]!==null?Math.round(avgs[d.key])+'%':'—'}</div><div class="kpi-meta">Média do time</div></div>`).join('');
 
  document.getElementById('supView').innerHTML = `
    <div class="note" style="margin-bottom:14px">📊 Média consolidada de todos os CS — ${MONTHS[mi]}</div>
    <div class="global-card" style="margin-bottom:14px">
      <div><div class="g-ey">Média Global do Time</div><div class="g-num">${gbl!==null?f1(gbl)+'%':'—'}</div><div class="g-sub">${gbl===null?'Sem dados':gbl>=100?'Meta atingida':f1(100-gbl)+' p.p. abaixo da meta'}</div></div>
      <svg width="88" height="88" viewBox="0 0 88 88">
        <circle cx="44" cy="44" r="32" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="7"/>
        <circle cx="44" cy="44" r="32" fill="none" stroke="url(#gb)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${(clamp/100)*circ} ${circ}" transform="rotate(-90 44 44)"/>
        <defs><linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B21E8"/><stop offset="100%" stop-color="#F5B731"/></linearGradient></defs>
      </svg>
      <div class="g-bd">${bd}</div>
    </div>
    <div class="grid">${grid}</div>`;
}
 
function renderSupTime(mkey) {
  const csOnly2 = teamData.filter(m=>!SUPERVISOR.includes(m.email));
  const rows = csOnly2.length ? csOnly2.map(member=>{
    const mp=member.perf[mkey]||{}, mt=getMeta(member.meta,mi);
    const gbl=globalScore(member.perf,member.meta,mi);
    const pctCls=gbl===null?'n':gbl>=100?'g':gbl>=75?'a':'r';
    const chips=['conversao','churn','reengajamento','cobertura'].map(k=>{
      const v=pct(k,mp[k],mt);
      const lbl=k==='conversao'?'Conv':k==='churn'?'Churn':k==='reengajamento'?'Reengaj':'Cobert';
      return `<span class="chip ${chipCls(v)}">${lbl} ${v!==null?Math.round(v)+'%':'—'}</span>`;
    }).join('');
    return `<div class="cs-row">
      <div class="cs-left"><div class="cs-av">${initials(member.name)}</div><div><div class="cs-name">${member.name||'—'}</div><div class="cs-email">${member.email||''}</div></div></div>
      <div class="cs-right"><div class="chips">${chips}</div><div class="cs-pct ${pctCls}">${gbl!==null?f1(gbl)+'%':'—'}</div><button class="edit-meta-btn" data-uid="${member.id}" onclick="openSupCal(this.dataset.uid)">📅 Calendário</button><button class="edit-meta-btn" data-uid="${member.id}" data-uname="${(member.name||'').replace(/"/g,'&quot;')}" onclick="openMetaModal(this.dataset.uid,this.dataset.uname)">Editar metas</button></div>
    </div>`;
  }).join('') : '<div class="empty-state">Nenhum colaborador encontrado</div>';
 
  document.getElementById('supView').innerHTML = `
    <div class="note" style="margin-bottom:14px">✏️ Defina as metas individuais de cada CS</div>
    <div class="sup-panel"><div class="sup-head">Time CS — ${MONTHS[mi]}</div>${rows}</div>`;
}

    <div class="mfield"><label>Meta Reuniões (nº)</label><input id="m_reunioes" type="number" step="1" value="${mt.reunioes??DMETA.reunioes}"></div>

  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m_conversao')?.focus(),60);
}
 
 
 
 
 
 
function closeModal(){ document.getElementById('overlay').classList.remove('open'); modalKey=null; modalUid=null; }
 
async function saveModal() {
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Salvando...';
  const mes=MKEYS[mi];
  let ok=false;
 
  if (modalUid) {
    const mv={
      user_id:modalUid, mes,
      conversao:    parseFloat(document.getElementById('m_conversao').value)||DMETA.conversao,
      churn:        parseFloat(document.getElementById('m_churn').value)||DMETA.churn,
      reengajamento:parseFloat(document.getElementById('m_reengajamento').value)||DMETA.reengajamento,
      cobertura:    parseFloat(document.getElementById('m_cobertura').value)||DMETA.cobertura,
      reunioes:     parseFloat(document.getElementById('m_reunioes').value)||DMETA.reunioes,
      nps:          parseFloat(document.getElementById('m_nps').value)||DMETA.nps,
    };
    ok=await UPSERT('metas_usuario',mv);
    if(ok){ const m=teamData.find(x=>x.id===modalUid); if(m) m.meta[mes]={...mv}; }
  } else {
    const val=parseFloat(document.getElementById('mInput').value);
    if (!isNaN(val)) {
      // Build row with only non-null values + the new value
      const existing = uPerf[mes]||{};
      const row = {user_id:user.id, mes};
      ['conversao','churn','reengajamento','cobertura','reunioes','nps'].forEach(k=>{
        if (existing[k]!==null && existing[k]!==undefined) row[k]=existing[k];
      });
      row[modalKey]=val;
      ok=await UPSERT('metricas',row);
      if(ok) uPerf[mes][modalKey]=val;
    }
  }
 
  btn.disabled=false; btn.textContent='Salvar';
  if(ok){ closeModal(); render(); }
  else {
    btn.textContent='Erro — tente novamente';
    btn.style.background='#f87171';
    setTimeout(()=>{ btn.textContent='Salvar'; btn.style.background=''; btn.disabled=false; },3000);
  }
}

// ── CALENDAR ─────────────────────────────────
// Supervisor opens a CS's calendar in a dedicated modal
function openSupCal(uid) {
  _calUid = uid;
  _calDay = null;
  _calData = getCalDataFor(uid);
  const member = teamData.find(m=>m.id===uid);
  document.getElementById('supCalName').textContent = (member?.name||'CS') + ' — ' + MONTHS[mi];
  renderSupCalGrid();
  document.getElementById('supCalOverlay').classList.add('open');
}
 
function closeSupCal() {
  document.getElementById('supCalOverlay').classList.remove('open');
  _calUid = null;
  _calDay = null;
}
 
function renderSupCalGrid() {
  const total = calTotal(_calData);
  document.getElementById('supCalCount').textContent = total + ' reunião(ões)';
 
  const year = new Date().getFullYear();
  const monthIdx = mi;
  const firstDay = new Date(year, monthIdx, 1).getDay();
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
  const today = new Date();
  const isCurMonth = today.getMonth()===monthIdx && today.getFullYear()===year;
 
  let cells = [];
  for (let i=0;i<firstDay;i++) cells.push('<td class="cal-td empty"><div class="cal-day-inner"></div></td>');
  for (let d=1;d<=daysInMonth;d++) {
    const meets = _calData[String(d)] || [];
    const isToday = isCurMonth && today.getDate()===d;
    const hasMeet = meets.length > 0;
    const chips = meets.slice(0,3).map(m=>`<span class="cal-meet-chip">● ${m}</span>`).join('');
    const more = meets.length>3 ? `<span class="cal-meet-more">+${meets.length-3} mais</span>` : '';
    cells.push(`<td class="cal-td${isToday?' today':''}${hasMeet?' has-meet':''}" onclick="openSupDayModal(${d})">
      <div class="cal-day-inner">
        <div class="cal-day-num">${d}</div>
        ${chips}${more}
      </div>
    </td>`);
  }
  while (cells.length % 7 !== 0) cells.push('<td class="cal-td empty"><div class="cal-day-inner"></div></td>');
  let rows = '';
  for (let i=0;i<cells.length;i+=7) rows += '<tr>' + cells.slice(i,i+7).join('') + '</tr>';
  document.getElementById('supCalGrid').innerHTML = rows;
}
 
// Supervisor clicks a day — reuses the day modal on top of the cal modal
function openSupDayModal(day) {
  _calDay = day;
  document.getElementById('dayModalDate').textContent = day + ' de ' + MONTHS[mi];

  document.getElementById('dayOverlay').classList.add('open');

let _calUid = null;      // whose calendar (null = own)
let _calDay  = null;     // selected day number
let _calData = {};       // { "5": ["Meet A", "Meet B"], ... }
 
function getCalDataFor(uid) {
  const mes = MKEYS[mi];
  const isOwn = !uid || uid === user.id;
  const src = isOwn ? uPerf : (teamData.find(m=>m.id===uid)?.perf);
  if (!src) return {};
  const raw = src[mes]?.reunioes_nomes || '';
  if (!raw) return {};
  try { return JSON.parse(raw); } catch(e) { return {}; }
}
 
function getOldOffset(uid) {
  // Returns the numeric count that existed before calendar was introduced
  const mes = MKEYS[mi];
  const isOwn = !uid || uid === user.id;
  const src = isOwn ? uPerf : (teamData.find(m=>m.id===uid)?.perf);
  if (!src) return 0;
  const raw = src[mes]?.reunioes_nomes || '';
  const oldNumeric = src[mes]?.reunioes || 0;
 
  // No JSON yet - first time ever using calendar
  if (!raw || raw === '{}' || raw === '') return oldNumeric;
 
  try {
    const parsed = JSON.parse(raw);
    const calCount = Object.entries(parsed)
      .filter(([k])=>k !== '__offset')
      .reduce((s,[,a])=>s+(Array.isArray(a)?a.length:0), 0);
 
    // If __offset was previously stored, use it
    if (typeof parsed.__offset === 'number' && parsed.__offset > 0) {
      return parsed.__offset;
    }
    // __offset is 0 or missing - check if oldNumeric > calCount
    // meaning there were reunioes before calendar was introduced
    if (oldNumeric > calCount) return oldNumeric - calCount;
    return 0;
  } catch(e) { return 0; }
}
 
function calTotal(data) {
  return Object.entries(data)
    .filter(([k])=>k !== '__offset')
    .reduce((s,[,a])=>s+(Array.isArray(a)?a.length:0), 0);
}
 
function renderCalendar(uid) {
  _calUid = uid !== undefined ? uid : null;
  _calData = getCalDataFor(_calUid);
  const grid = document.getElementById('calDaysGrid');
  if (!grid) return;
 
  const year = new Date().getFullYear();
  const monthIdx = mi;
  const firstDay = new Date(year, monthIdx, 1).getDay();
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();
  const today = new Date();
  const isCurMonth = today.getMonth()===monthIdx && today.getFullYear()===year;
  const total = calTotal(_calData);
 
  // Update count badge
  const countEl = document.getElementById('calCountLabel');
  if (countEl) countEl.textContent = total + ' reunião(ões)';
 
  // Build weeks as table rows
  let cells = [];
  for (let i=0;i<firstDay;i++) cells.push('<td class="cal-td empty"><div class="cal-day-inner"></div></td>');
  for (let d=1;d<=daysInMonth;d++) {
    const meets = _calData[String(d)] || [];
    const isToday = isCurMonth && today.getDate()===d;
    const hasMeet = meets.length > 0;
    const chips = meets.slice(0,3).map(m=>`<span class="cal-meet-chip">● ${m}</span>`).join('');
    const more = meets.length>3 ? `<span class="cal-meet-more">+${meets.length-3} mais</span>` : '';
    cells.push(`<td class="cal-td${isToday?' today':''}${hasMeet?' has-meet':''}" onclick="openDayModal(${d})">
      <div class="cal-day-inner">
        <div class="cal-day-num">${d}</div>
        ${chips}${more}
      </div>
    </td>`);
  }
  // Pad to complete last row
  while (cells.length % 7 !== 0) cells.push('<td class="cal-td empty"><div class="cal-day-inner"></div></td>');
 
  // Split into rows
  let rows = '';
  for (let i=0;i<cells.length;i+=7) {
    rows += '<tr>' + cells.slice(i,i+7).join('') + '</tr>';
  }
  grid.innerHTML = rows;
}
 
function openDayModal(day) {
  _calDay = day;
  document.getElementById('dayModalDate').textContent = day + ' de ' + MONTHS[mi];
  renderDayMeetList();
  document.getElementById('dayOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('dayAddInput')?.focus(), 60);
}
 
function closeDayModal() {
  document.getElementById('dayOverlay').classList.remove('open');
  _calDay = null;
}
 
function renderDayMeetList() {
  const meets = _calData[String(_calDay)] || [];
  document.getElementById('dayMeetList').innerHTML = meets.length > 0
    ? meets.map((name,i) => `
        <div class="day-meet-item">
          <div class="day-meet-bullet"></div>
          <input class="day-meet-input" value="${name.replace(/"/g,'&quot;')}"
            onchange="editDayMeeting(${i},this.value)"
            onblur="editDayMeeting(${i},this.value)">
          <button class="day-meet-del" onclick="removeDayMeeting(${i})">✕</button>
        </div>`).join('')
    : '<div class="day-empty-msg">Nenhuma reunião neste dia ainda.</div>';
}
 
function addDayMeeting() {
  const input = document.getElementById('dayAddInput');
  const val = (input?.value||'').trim();
  if (!val || _calDay===null) return;
  if (!_calData[String(_calDay)]) _calData[String(_calDay)] = [];
  _calData[String(_calDay)].push(val);
  input.value = '';
  renderDayMeetList();
  saveCal();
}
 
function editDayMeeting(idx, newVal) {
  if (_calDay===null) return;
  const trimmed = (newVal||'').trim();
  if (!trimmed) return;
  if (!_calData[String(_calDay)]) return;
  _calData[String(_calDay)][idx] = trimmed;
  saveCal();
}
 
function removeDayMeeting(idx) {
  if (_calDay===null) return;
  _calData[String(_calDay)].splice(idx, 1);
  if (_calData[String(_calDay)].length === 0) delete _calData[String(_calDay)];
  renderDayMeetList();
  saveCal();
}
 
async function saveCal() {
  const mes = MKEYS[mi];
  const targetUid = _calUid || user.id;
  const isOwn = !_calUid || _calUid === user.id;
  const nomesStr = JSON.stringify(_calData);
  const count = calTotal(_calData);
 
  const existing = isOwn ? (uPerf[mes]||{}) : (teamData.find(m=>m.id===targetUid)?.perf[mes]||{});
  const row = {user_id: targetUid, mes};
  ['conversao','churn','reengajamento','cobertura','nps'].forEach(k=>{
    if (existing[k]!==null && existing[k]!==undefined) row[k] = existing[k];
  });
  // Get the offset (numeric count before calendar was introduced)
  const offset = getOldOffset(targetUid);
  _calData.__offset = offset;
  const nomesStrWithOffset = JSON.stringify(_calData);
  const finalCount = offset + count;
  console.log('saveCal debug:', {
    offset, count, finalCount,
    existing_reunioes: existing.reunioes,
    existing_nomes_raw: existing.reunioes_nomes?.substring(0,80),
    hadNoNames: !existing.reunioes_nomes || existing.reunioes_nomes === '' || existing.reunioes_nomes === '{}'
  });
  row.reunioes = finalCount;
  row.reunioes_nomes = nomesStrWithOffset;
 
  const ok = await UPSERT('metricas', row);
  if (ok) {
    if (isOwn) {
      uPerf[mes].reunioes = finalCount;
      uPerf[mes].reunioes_nomes = nomesStrWithOffset;
    } else {
      const member = teamData.find(m=>m.id===targetUid);
      if (member) {
        member.perf[mes].reunioes = finalCount;
        member.perf[mes].reunioes_nomes = nomesStrWithOffset;
      }
    }
    renderCalendar(_calUid);
    render();
  }
}

// ── UTILS ────────────────────────────────────
function diasUteisRestantes() {
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = hoje.getMonth();
  // Only relevant for current month
  if (mi !== mes) return 0;
  const ultimo = new Date(ano, mes+1, 0).getDate();
  let uteis = 0;
  for (let d = hoje.getDate(); d <= ultimo; d++) {
    const dow = new Date(ano, mes, d).getDay();
    if (dow !== 0 && dow !== 6) uteis++;
  }
  return uteis;
}
 
function reunioesPorDia(realizadas, meta) {
  const faltam = meta - realizadas;
  if (faltam <= 0) return null; // já bateu a meta
  const dias = diasUteisRestantes();
  if (dias <= 0) return null;
  return faltam / dias;
}

function toggleTheme() {

  document.getElementById('themeBtn').textContent = isDark ? '🌙 Escuro' : '☀️ Claro';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme','light');

})();
